<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ChunkEar · 语块听</title>

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ChunkEar">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4A90D9">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="../icon-192.png">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== HEADER ====== -->
  <header id="header">
    <div class="header-inner">
      <div class="logo" onclick="ChunkApp.showHome()">
        🎧 ChunkEar
        <span class="logo-sub">语块听</span>
      </div>
    </div>
  </header>

  <!-- ====== MAIN ====== -->
  <main id="main-content">

    <!-- HOME VIEW -->
    <section id="view-home" class="view active">
      <h1 class="section-title">语义模块听力训练</h1>
      <p class="section-subtitle">
        从最简单的语义模块开始，逐级自动化，彻底攻克英语听力。<br>
        不达标，不进级。
      </p>
      <div class="level-grid" id="level-grid"></div>
      <div style="margin-top:24px;text-align:center;font-size:12px;color:#bbb;">
        数据自动保存在本机 · 隐私无忧
      </div>

      <!-- 语音设置 -->
      <div class="voice-settings" id="voice-settings" style="margin-top:16px;padding:16px;background:var(--card);border-radius:var(--radius);box-shadow:0 1px 4px rgba(0,0,0,0.06);">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div>
            <div style="font-size:14px;font-weight:600;">🔊 语音设置</div>
            <div style="font-size:12px;color:#888;margin-top:2px;">选个声音，点"试听"</div>
          </div>
          <select id="voice-select" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fff;max-width:180px;"></select>
        </div>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <button class="btn btn-secondary" style="padding:6px 14px;font-size:13px;" onclick="ChunkApp.testVoice()">▶ 试听</button>
          <span style="font-size:12px;color:#888;">语速:</span>
          <select id="rate-select" style="padding:4px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;" onchange="AudioManager.setRate(parseFloat(this.value))">
            <option value="0.7">慢</option>
            <option value="0.85">偏慢</option>
            <option value="1.0" selected>正常</option>
            <option value="1.15">偏快</option>
            <option value="1.3">快</option>
          </select>
        </div>
        <div style="margin-top:8px;font-size:12px;color:#999;" id="voice-status">正在加载语音列表...</div>
        <details style="margin-top:8px;font-size:12px;color:#888;">
          <summary style="cursor:pointer;">💡 声音太机器？试试装高级语音</summary>
          <div style="margin-top:6px;padding:8px;background:#f8f9fa;border-radius:6px;line-height:1.6;">
            <b>Mac 上：</b>系统设置 → 辅助功能 → 朗读内容 → 系统语音 → 选"Samantha（增强）"等高品质语音<br>
            <b>iPhone 上：</b>设置 → 辅助功能 → 朗读内容 → 声音 → 英语 → 下载高品质语音<br>
            装好后刷新页面，下拉菜单就会出现新语音
          </div>
        </details>
      </div>
    </section>

    <!-- LEVEL VIEW -->
    <section id="view-level" class="view">
      <div class="back-row" onclick="ChunkApp.goBack()">
        <button class="back-btn">‹</button>
        <span style="font-size:14px;color:#888;">返回</span>
      </div>
      <div class="level-header">
        <h2 id="level-title"></h2>
        <div class="stats" id="level-stats"></div>
      </div>

      <div class="section-title" style="font-size:16px;margin-bottom:8px;">练习模式</div>
      <div class="mode-grid" id="level-modes"></div>

      <div style="margin-top:24px;">
        <div class="section-title" style="font-size:16px;margin-bottom:8px;">模块列表</div>
        <div class="module-list" id="module-list"></div>
      </div>
    </section>

    <!-- TRAINING VIEW -->
    <section id="view-training" class="view">
      <div class="back-row" onclick="ChunkApp.goBack()">
        <button class="back-btn">‹</button>
        <span style="font-size:14px;color:#888;">返回</span>
      </div>
      <div id="training-header"></div>
      <div id="training-area" class="training-area"><div class="loading">加载中...</div></div>
    </section>

  </main>

  <!-- ====== SCRIPTS ====== -->
  <script src="js/audio.js"></script>
  <script src="js/corpus.js"></script>
  <script src="js/chunkear.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => ChunkApp.init());
  </script>
</body>
</html>
