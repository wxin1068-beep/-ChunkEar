<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>ChunkEar · 语块听</title>

    <!-- PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="ChunkEar" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="theme-color"
      content="#4A90D9"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#121212"
      media="(prefers-color-scheme: dark)"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ====== HEADER ====== -->
    <header id="header">
      <div class="header-inner">
        <div class="logo" onclick="ChunkApp.showHome()">
          🎧 ChunkEar
          <span class="logo-sub">语块听</span>
        </div>
        <div class="header-actions">
          <button onclick="ChunkApp.toggleTheme()" title="切换主题">🌓</button>
        </div>
      </div>
    </header>

    <!-- ====== MAIN ====== -->
    <main id="main-content">
      <!-- HOME VIEW -->
      <section id="view-home" class="view active">
        <h1 class="section-title">语义模块听力训练</h1>
        <p class="section-subtitle">
          从最简单的语义模块开始，逐级自动化，彻底攻克英语听力。<br />
          不达标，不进级。
        </p>

        <!-- 复习提醒 -->
        <div id="review-banner-container"></div>

        <div class="level-grid" id="level-grid"></div>

        <!-- 语音设置 -->
        <div class="voice-settings">
          <div
            style="
              display: flex;
              align-items: center;
              justify-content: space-between;
            "
          >
            <div>
              <div class="voice-settings-header">🔊 语音设置</div>
              <div
                style="font-size: 12px; color: var(--text2); margin-top: 2px"
              >
                无需选择，即点即听
              </div>
            </div>
          </div>
          <div
            style="
              margin-top: 8px;
              display: flex;
              gap: 8px;
              align-items: center;
              flex-wrap: wrap;
            "
          >
            <button
              class="btn btn-secondary"
              style="padding: 6px 14px; font-size: 13px"
              onclick="ChunkApp.testVoice()"
            >
              ▶ 试听
            </button>
            <span style="font-size: 12px; color: var(--text2)">语速:</span>
            <select
              id="rate-select"
              style="
                padding: 4px 8px;
                border: 1px solid var(--border);
                border-radius: 6px;
                font-size: 12px;
                background: var(--card);
                color: var(--text);
              "
              onchange="AudioManager.setRate(parseFloat(this.value))"
            >
              <option value="0.7">慢</option>
              <option value="0.85">偏慢</option>
              <option value="1.0" selected>正常</option>
              <option value="1.15">偏快</option>
              <option value="1.3">快</option>
            </select>
          </div>
          <div
            style="margin-top: 8px; font-size: 12px; color: var(--text3)"
            id="voice-status"
          >
            ✅ 即点即听
          </div>
        </div>

        <!-- 数据管理 -->
        <div class="data-mgmt">
          <div class="data-mgmt-header">💾 数据管理</div>
          <div class="data-mgmt-actions">
            <button
              class="btn btn-secondary"
              onclick="ChunkApp.exportProgress()"
            >
              📤 导出进度
            </button>
            <label class="btn btn-secondary" style="cursor: pointer"
              >📥 导入进度
              <input
                type="file"
                accept=".json"
                style="display: none"
                onchange="
                  ChunkApp.importProgress(this.files[0]);
                  this.value = '';
                "
              />
            </label>
            <button
              class="btn btn-secondary"
              onclick="ChunkApp.showCustomMgmt()"
            >
              📝 管理语料库
            </button>
          </div>
          <div style="font-size: 11px; color: var(--text3); margin-top: 6px">
            数据自动保存在本机 · 可随时导出备份 · 自定义语料库支持导入导出
          </div>
        </div>
        <div
          style="
            text-align: center;
            font-size: 11px;
            color: var(--text3);
            margin-top: 32px;
            padding-bottom: 8px;
          "
        >
          ChunkEar v1.1 · 语块听力训练
        </div>
      </section>

      <!-- CUSTOM CORPUS MANAGEMENT VIEW -->
      <section id="view-custom-mgmt" class="view">
        <div class="back-row" onclick="ChunkApp.showHome()">
          <button class="back-btn">‹</button>
          <span style="font-size: 14px; color: var(--text2)">返回</span>
        </div>
        <div id="custom-mgmt-area"></div>
      </section>

      <!-- LEVEL VIEW -->
      <section id="view-level" class="view">
        <div class="back-row" onclick="ChunkApp.goBack()">
          <button class="back-btn">‹</button>
          <span style="font-size: 14px; color: var(--text2)">返回</span>
        </div>
        <div class="level-header">
          <h2 id="level-title"></h2>
          <div class="stats" id="level-stats"></div>
        </div>

        <div class="section-title" style="font-size: 16px; margin-bottom: 8px">
          练习模式
        </div>
        <div class="mode-grid" id="level-modes"></div>

        <div style="margin-top: 24px">
          <div
            class="section-title"
            style="font-size: 16px; margin-bottom: 8px"
          >
            模块列表
          </div>
          <div class="module-list" id="module-list"></div>
        </div>
      </section>

      <!-- TRAINING VIEW -->
      <section id="view-training" class="view">
        <div class="back-row" onclick="ChunkApp.goBack()">
          <button class="back-btn">‹</button>
          <span style="font-size: 14px; color: var(--text2)">返回</span>
        </div>
        <div id="training-header"></div>
        <div id="training-area" class="training-area">
          <div class="loading">加载中...</div>
        </div>
      </section>
    </main>

    <script src="js/audio.js"></script>
    <script src="js/corpus.js"></script>
    <script src="js/chunkear.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => ChunkApp.init());
    </script>
  </body>
</html>
